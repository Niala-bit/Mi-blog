<!DOCTYPE html>
<html>
<head>
    <title>Mi Blog</title>
       <!-- Favicon principal -->
        <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
        <!-- Versiones para navegadores modernos -->
        <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='favicon-192x192.png') }}">
        <link rel="icon" type="image/png" sizes="512x512" href="{{ url_for('static', filename='favicon-512x512.png') }}">
        <!-- Para iPhone/iPad -->
        <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1>Mi Blog Personal</h1>

    <a href="/crear">Crear Nuevo Post</a>

    <hr>

    {% for post in posts %}
        <h2>{{post.titulo}}</h2>
        <p>{{post.contenido}}</p>
        <a href = "/eliminar/{{post.id}}">Eliminar Post</a>
        <a href = "/editar/{{post.id}}">Editar Post</a>
        <hr>

    {% endfor %}
</body>
</html>
