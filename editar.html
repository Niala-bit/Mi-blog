<!DOCTYPE html>
<html>
    <head>
        <title>Editar Post</title>
    </head>
<body> 
    <h1>Editar</h1>

    <form action = "/editar/{{post.id}}" method = "POST">
        <label>Titulo:</label>
        <input type = "text" name = "titulo" value = "{{post.titulo}}">
        <label>Contenido:</label>
        <textarea name = "contenido">{{post.contenido}}</textarea>
    <button type = "submit"> Editar Post</button>
    </form>

    <a href = "/">Volver</a>

</body>
</html>
